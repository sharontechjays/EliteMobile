name: E2E (Maestro)

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  workflow_dispatch: {}

# Without this, pushing several commits in quick succession queues one macOS runner per push
# instead of superseding the stale one — each waits behind the last for the same limited runner
# capacity, and the oldest can end up hitting timeout-minutes before it's even really failing.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  maestro:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      # RN 0.81 requires Xcode >= 16.1; select explicitly rather than trust the runner image's
      # default (macos-14 defaulted to 15.4). Use "latest-stable", not a pinned dot-version:
      # pinning to a specific version like 16.2 picked an Xcode whose app bundle was present but
      # whose matching iOS Simulator *platform* wasn't installed on this runner image ("iOS 18.2
      # is not installed") — only the runner's own officially provisioned Xcode version is
      # guaranteed to have a fully installed, matching simulator platform.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS Simulator
        run: |
          # Don't hardcode a device name: which iPhone simulators are preinstalled is tied to
          # the selected Xcode version above, and that lineup shifts across runner-image
          # updates (this is exactly what broke a previous hardcoded "iPhone 15"). Resolve to
          # whatever iPhone simulator is actually available instead.
          DEVICE_NAME=$(xcrun simctl list devices available | grep -E "^ +iPhone" | head -1 | sed -E 's/^ +(.+) \([-A-F0-9]+\).*/\1/')
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found on this runner:"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $DEVICE_NAME"
          echo "SIMULATOR_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          xcrun simctl bootstatus "$DEVICE_NAME" -b
          # bootstatus only confirms the simulator reached "Booted" state, not that its UI
          # (SpringBoard) is actually ready to handle requests yet — without this, the later
          # `expo run:ios` deep-link open (xcrun simctl openurl) intermittently timed out.
          sleep 10

      - name: Build and install app on simulator
        run: npx expo run:ios --no-install --device "$SIMULATOR_NAME"

      - name: Run Maestro flows
        run: maestro test .maestro/flows/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: maestro-screenshots
          path: "*.png"
          if-no-files-found: ignore
