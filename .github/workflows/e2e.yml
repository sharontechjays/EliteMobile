name: E2E (Maestro)

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
  workflow_dispatch: {}

jobs:
  maestro:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      # RN 0.81 requires Xcode >= 16.1; pin explicitly rather than trust the runner image's
      # default, since that default has changed under us before (macos-14 defaults to 15.4).
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS Simulator
        run: |
          xcrun simctl bootstatus "iPhone 15" -b

      - name: Build and install app on simulator
        run: npx expo run:ios --no-install --device "iPhone 15"

      - name: Run Maestro flows
        run: maestro test .maestro/flows/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: maestro-screenshots
          path: "*.png"
          if-no-files-found: ignore
